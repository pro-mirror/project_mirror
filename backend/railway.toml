[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
rootDirectory = "backend"

[deploy]
startCommand = "/app/project-mirror-backend"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# 環境変数の例（実際の値はRailway UIで設定）
# OPENAI_API_KEY=
# QDRANT_URL=
# QDRANT_API_KEY=
# NEO4J_URI=
# NEO4J_USER=
# NEO4J_PASSWORD=
# POSTGRES_URL=（未定・Keycloak用）
# KEYCLOAK_URL=（未定・将来の認証用）
# KEYCLOAK_CLIENT_ID=（未定）
# KEYCLOAK_CLIENT_SECRET=（未定）
