# Railway configuration for Project Mirror Backend
# This file is the source of truth for deployment configuration.
# Dashboard settings only supplement what is not defined here.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/project-mirror-backend"
healthcheckPath = "/health"
healthcheckTimeout = 300
sleepApplication = true
region = "us-east4-eqdc4a"
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.domains]]
domain = "projectmirror-production.up.railway.app"

[environments.production.deploy]
region = "us-east4-eqdc4a"
numReplicas = 1

# ---------------------------------------------------------------------------
# Environment variables
#
# Sensitive values (API keys, passwords, connection strings) are intentionally
# left unset here so they are managed as Railway secret variables in the
# dashboard and never committed to version control.
#
# Non-sensitive defaults that are safe to codify are set below.
# ---------------------------------------------------------------------------

[environments.production.variables]
# Logging level（平常時は info、デバッグ時は debug に設定することを推奨）
# RUST_LOG = "info"
RUST_LOG = "debug,project_mirror_backend=debug"

# The following variables must be set as Railway dashboard variables:
#   HOST (default: 0.0.0.0)
#   NEO4J_USER
#   NEO4J_DATABASE
#   OPENAI_API_KEY
#   QDRANT_URL
#   QDRANT_API_KEY
#   NEO4J_URI
#   NEO4J_PASSWORD
#   DATABASE_URL (use private endpoint: ${{Postgres.DATABASE_PRIVATE_URL}})
